<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あなたの意思決定タイプ診断 — 行動経済学ゲーム</title>
<meta name="description" content="行動経済学の研究に基づいた10問の診断ゲーム。あなたの合理性、直感型か熟考型か、損失回避の傾向、現在志向か未来志向かを無料で診断します。Kahneman & Tverskyのプロスペクト理論がベース。">
<meta name="keywords" content="行動経済学,意思決定,心理テスト,診断,プロスペクト理論,バイアス,System1,System2,損失回避,無料">
<meta property="og:title" content="あなたの意思決定タイプ診断 — 行動経済学ゲーム">
<meta property="og:description" content="たった10問であなたの意思決定パターンがわかる。行動経済学ベースの無料診断ゲーム。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://mogura00.github.io/behavioral-economics-game/">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="あなたの意思決定タイプ診断">
<meta name="twitter:description" content="ただ10問で診断。行動経済学の理論に基づいた合理性判定。">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --accent1: #6c63ff;
  --accent2: #ff6584;
  --text: #e8e8f0;
  --text-dim: #8888aa;
  --green: #4ecdc4;
  --orange: #ffbe76;
}
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
.container {
  max-width: 680px;
  margin: 0 auto;
  padding: 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
</style>
</head>
<body>
<div class="container">
  <div id="start-screen">
    <h1>あなたの意思決定タイプ診断</h1>
    <p class="subtitle">行動経済学の理論に基づいた10問の診断<br>あなたの合理性、判断パターンがわかります。</p>
    <button class="btn-primary" onclick="startGame()">診断を始める</button>
  </div>
  <div id="game-screen" style="display: none;">
    <div class="progress-bar-container"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="question-counter" id="question-counter"></div>
    <div class="question-category" id="question-category"></div>
    <div class="question-card slide-in" id="question-card">
      <div class="scenario" id="scenario"></div>
      <div class="question-text" id="question-text"></div>
      <div class="choices" id="choices"></div>
    </div>
    <div class="timer-bar"><div class="timer-fill" id="timer-fill"></div></div>
  </div>
  <div id="result-screen" style="display: none;">
    <div class="result-header">
      <h2>診断結果</h2>
      <div class="type-name" id="type-name"></div>
    </div>
    <div class="gauge-section" id="gauge-section"></div>
    <div id="insights"></div>
    <div class="share-section">
      <button class="btn-secondary" onclick="shareResult()">結果をシェア</button>
      <button class="btn-primary" onclick="retryGame()" style="padding:12px 32px; font-size:0.95em;">もう一度診断</button>
    </div>
    <footer>
      行動経済学の理論に基づく診断ゲーム。<br>
      参考:<br>Kahneman & Tversky (1979) "Prospect Theory"<br>
      Thaler (1985) "Mental Accounting"<br>
      Frederick, Loewenstein & O'Donoghue (2002) "Time Discounting and Time Preference"
    </footer>
  </div>
</div>

<script>
// Game data and logic
const allQuestions = [];

function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
}

function retryGame() {
  document.getElementById('result-screen').style.display = 'none';
  startGame();
}

function shareResult() {
  const typeName = document.getElementById('type-name').textContent;
  const text = "行動経済学の意思決定診断:" + typeName;
  if (navigator.share) {
    navigator.share({ title: 'あなたの意思決定タイプ診断', text: text });
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      alert('結果をコピーしました！SNSでシェアしてください。');
    });
  } else {
    prompt('こちらをコピーしてシェアしてください:', text);
  }
}
</script>
</body>
</html>
